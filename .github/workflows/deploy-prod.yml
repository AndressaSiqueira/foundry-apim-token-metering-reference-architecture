name: Deploy Prod

on:
  workflow_dispatch:
    inputs:
      resourceGroup:
        description: Azure resource group for production deployment
        required: true
        default: rg-token-metering-prod
      environmentName:
        description: Environment name passed to Bicep
        required: true
        default: prod
      foundryResourceGroupName:
        description: Optional Foundry resource group (leave default to use same RG)
        required: true
        default: rg-token-metering-prod

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  what-if:
    name: What-If (Prod)
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Bicep What-If
        run: |
          az bicep install
          az deployment group what-if \
            --resource-group "${{ github.event.inputs.resourceGroup }}" \
            --template-file infra/bicep/main.bicep \
            --parameters infra/bicep/main.bicepparam \
            --parameters environmentName="${{ github.event.inputs.environmentName }}" \
            --parameters foundryAccountName="${{ vars.FOUNDRY_ACCOUNT_NAME }}" \
            --parameters foundryResourceGroupName="${{ github.event.inputs.foundryResourceGroupName }}"

  deploy:
    name: Deploy (Prod)
    runs-on: ubuntu-latest
    needs: what-if
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep (Prod)
        run: |
          az bicep install
          az deployment group create \
            --resource-group "${{ github.event.inputs.resourceGroup }}" \
            --template-file infra/bicep/main.bicep \
            --parameters infra/bicep/main.bicepparam \
            --parameters environmentName="${{ github.event.inputs.environmentName }}" \
            --parameters foundryAccountName="${{ vars.FOUNDRY_ACCOUNT_NAME }}" \
            --parameters foundryResourceGroupName="${{ github.event.inputs.foundryResourceGroupName }}"
