# .github/workflows/ci.yml
# CI pipeline for foundry-apim-token-metering-reference-architecture
#
# Jobs:
#   lint         – ruff linter (Python)
#   typecheck    – mypy static type-checking
#   test         – pytest with code-coverage reporting
#   bicep-build  – az bicep build to validate Bicep templates
#
# Authentication:
#   Uses OIDC federated identity (no stored long-lived secrets).
#   Configure a GitHub OIDC credential in Azure AD and set the three
#   repository secrets / variables listed in the bicep-build job.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for OIDC login in bicep-build

jobs:
  # ---------------------------------------------------------------------------
  # Lint: ruff
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/agent-app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: src/agent-app/requirements.txt

      - name: Install dependencies
        run: pip install --quiet -r requirements.txt

      - name: Run ruff check
        run: ruff check app/ tests/

      - name: Run ruff format check
        run: ruff format --check app/ tests/

  # ---------------------------------------------------------------------------
  # Type-check: mypy
  # ---------------------------------------------------------------------------
  typecheck:
    name: Type-check (mypy)
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: src/agent-app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: src/agent-app/requirements.txt

      - name: Install dependencies
        run: pip install --quiet -r requirements.txt

      - name: Run mypy
        run: mypy app/ --ignore-missing-imports --strict

  # ---------------------------------------------------------------------------
  # Test: pytest + coverage
  # ---------------------------------------------------------------------------
  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: src/agent-app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: src/agent-app/requirements.txt

      - name: Install dependencies
        run: pip install --quiet -r requirements.txt

      - name: Run tests
        env:
          # Provide placeholder values so pydantic-settings doesn’t raise on startup.
          # Tests mock all external calls; no real Azure services are contacted.
          APIM_GATEWAY_URL: http://mock-apim
          APIM_SUBSCRIPTION_KEY: test-key
          APPLICATIONINSIGHTS_CONNECTION_STRING: ""
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: src/agent-app/coverage.xml
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Bicep build: validate Bicep templates compile without errors
  # ---------------------------------------------------------------------------
  bicep-build:
    name: Bicep build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Install Bicep CLI
        run: az bicep install

      - name: Build main.bicep
        run: |
          az bicep build \
            --file infra/bicep/main.bicep \
            --outdir /tmp/bicep-out

      - name: Validate Bicep modules individually
        run: |
          for f in infra/bicep/modules/*.bicep; do
            echo "Building $f ..."
            az bicep build --file "$f" --outdir /tmp/bicep-out
          done
